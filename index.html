<!-- 📱 BOTA PREMIUM SIGN-IN SCREEN -->
<div id="gatewayScreen" class="auth-screen">
    <div class="auth-card">
        
        <!-- Top Branding Header -->
        <div class="bota-top-header">
            <div class="bota-brand-title">Bota Solutions</div>
            <div class="bota-lang-dropdown">
                <select id="authLangSelect">
                    <option value="en" selected>English ▾</option>
                    <option value="am">አማርኛ ▾</option>
                </select>
            </div>
        </div>
        
        <!-- Welcome Text / Icon -->
        <div class="bota-welcome-section">
            <div class="bota-app-icon">🏆</div>
            <h2 class="login-heading">Welcome to Bota</h2>
            <p class="welcome-subtitle">Enter your mobile number to check in</p>
        </div>
        
        <!-- Input Form -->
        <div class="bota-form-group">
            <label class="input-label">Mobile Number</label>
            <div class="bota-input-wrapper">
                <span class="country-code">+251</span>
                <input type="tel" id="gatePhone" class="bota-input-field" placeholder="911325430" inputmode="numeric">
            </div>
        </div>
        
        <!-- Next Button -->
        <button id="btnGateNext" class="bota-btn-next">Next</button>
        
        <!-- Create Account Link -->
        <div class="bota-register-redirect">
            Don't have an account? <span id="linkGoToRegister" class="bota-link-gold">Create New Account</span>
        </div>
        
        <!-- Bottom copyright -->
        <div class="bota-copyright-text">
            Terms and Conditions<br>
            © 2026 Bota Solutions. All rights reserved.
        </div>
        
    </div>
</div>
