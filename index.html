<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bota Solutions</title>
    <style>
        :root {
            --primary: #ffb800;
            --bg: #0b141a;
            --surface: #111b21;
            --input-bg: #2a3942;
            --text: #ffffff;
            --sub-text: #8696a0;
            --border: #222e35;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-bottom: 85px;
        }

        /* 🤖 WELCOME & LANGUAGE SCREEN */
        .welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            padding: 20px;
        }
        .glass-card {
            background: rgba(21, 29, 35, 0.7); backdrop-filter: blur(15px);
            padding: 40px 30px; border-radius: 30px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08); width: 100%; max-width: 380px;
        }
        .brand-title { font-size: 32px; font-weight: bold; margin-bottom: 25px; }
        .brand-title span { color: var(--primary); }
        .btn-start {
            background: linear-gradient(90deg, #ffb800 0%, #ff9900 100%);
            color: #000; padding: 16px 50px; border-radius: 50px;
            font-weight: 800; border: none; cursor: pointer;
        }
        .lang-grid { display: none; flex-direction: column; gap: 12px; width: 100%; margin-top: 10px; }
        .btn-lang {
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border);
            color: white; padding: 15px 20px; border-radius: 16px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* 📱 MAIN APP CONTAINER */
        #mainApp { display: none; width: 100%; max-width: 480px; padding: 15px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px 20px 5px; }
        .header-logo { font-size: 22px; font-weight: bold; }
        .header-logo span { color: var(--primary); }

        /* PAGE VIEWS */
        .app-page { display: none; animation: fadeIn 0.3s ease; }
        .app-page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* EMPTY STATE STYLE */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
            color: var(--sub-text);
        }
        .empty-icon {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* 🧭 BOTTOM NAVIGATION BAR */
        .bottom-nav {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 480px; height: 75px;
            background: #101a20; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 999; box-shadow: 0 -5px 20px rgba(0,0,0,0.4);
            padding: 0 10px;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--sub-text); cursor: pointer; font-size: 11px; font-weight: 600; text-decoration: none; width: 20%; text-align: center; }
        .nav-item .icon { font-size: 20px; margin-bottom: 4px; transition: transform 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active .icon { transform: translateY(-2px); }
    </style>
</head>
<body>

    <!-- 🤖 WELCOME SCREEN -->
    <div class="welcome-overlay" id="welcomeScreen">
        <div class="glass-card">
            <div class="brand-title">Bota<span>Solutions</span></div>
            <button class="btn-start" id="startBtn" onclick="onStartClicked()">START / ጀምር</button>
            <div id="langContainer" class="lang-grid">
                <button class="btn-lang" onclick="enterApp('amharic')"><span>አማርኛ (Amharic)</span> <span>🇪🇹</span></button>
                <button class="btn-lang" onclick="enterApp('english')"><span>English</span> <span>🇬🇧</span></button>
            </div>
        </div>
    </div>

    <!-- 📱 MAIN APP CONTENT -->
    <div id="mainApp">
        <header>
            <div class="header-logo">Bota<span>Solutions</span></div>
            <div style="font-size: 20px;">🔔</div>
        </header>

        <!-- 🏠 1. HOME PAGE VIEW (EMPTY) -->
        <div id="pageHome" class="app-page active">
            <div class="empty-state">
                <div class="empty-icon">🛍️</div>
                <p id="emptyHome">No active campaigns available right now.</p>
            </div>
        </div>

        <!-- 🎟️ 2. TICKETS PAGE VIEW (EMPTY) -->
        <div id="pageTickets" class="app-page">
            <h2 style="margin-bottom: 15px;" id="navTickets">My Tickets</h2>
            <div class="empty-state">
                <div class="empty-icon">🎟️</div>
                <p id="emptyTickets">You haven't purchased any tickets yet.</p>
            </div>
        </div>

        <!-- 🏆 3. WINNERS PAGE VIEW (EMPTY) -->
        <div id="pageWinners" class="app-page">
            <h2 style="margin-bottom: 15px;" id="navWinners">Recent Winners</h2>
            <div class="empty-state">
                <div class="empty-icon">🏆</div>
                <p id="emptyWinners">No winners announced yet. Stay tuned!</p>
            </div>
        </div>

        <!-- 👤 4. PROFILE PAGE VIEW (EMPTY) -->
        <div id="pageProfile" class="app-page">
            <h2 style="margin-bottom: 15px;" id="navProfileTitle">My Profile</h2>
            <div class="empty-state">
                <div class="empty-icon">👤</div>
                <p id="emptyProfile">Please sign in to view your profile setup.</p>
            </div>
        </div>

        <!-- 🧭 BOTTOM NAVIGATION BAR -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchPage('Home', this)">
                <span class="icon">🏠</span><span id="navHome">Home</span>
            </div>
            <div class="nav-item" onclick="switchPage('Tickets', this)">
                <span class="icon">🎟️</span><span id="navTicketsBtn">Tickets</span>
            </div>
            <div class="nav-item" onclick="switchPage('Winners', this)">
                <span class="icon">🏆</span><span id="navWinnersBtn">Winners</span>
            </div>
            <div class="nav-item" onclick="switchPage('Profile', this)">
                <span class="icon">👤</span><span id="navProfile">Profile</span>
            </div>
        </nav>
    </div>

    <script>
        const dicts = {
            amharic: { 
                navHome: "ዋና ገጽ", navTicketsBtn: "ቲኬቶች", navWinnersBtn: "አሸናፊዎች", navProfile: "ፕሮፋይል", 
                navTickets: "የእኔ ቲኬቶች", navWinners: "የቅርብ ጊዜ አሸናፊዎች", navProfileTitle: "የእኔ ፕሮፋይል",
                emptyHome: "በአሁኑ ጊዜ የሚገኙ ንቁ ዕድሎች የሉም።",
                emptyTickets: "እስካሁን ምንም ቲኬት አልገዙም።",
                emptyWinners: "እስካሁን ይፋ የተደረጉ አሸናፊዎች የሉም።",
                emptyProfile: "ፕሮፋይልዎን ለማየት እባክዎ መጀመሪያ ይግቡ።"
            },
            english: { 
                navHome: "Home", navTicketsBtn: "Tickets", navWinnersBtn: "Winners", navProfile: "Profile", 
                navTickets: "My Tickets", navWinners: "Recent Winners", navProfileTitle: "My Profile",
                emptyHome: "No active campaigns available right now.",
                emptyTickets: "You haven't purchased any tickets yet.",
                emptyWinners: "No winners announced yet. Stay tuned!",
                emptyProfile: "Please sign in to view your profile setup."
            }
        };

        function onStartClicked() { document.getElementById('startBtn').style.display = 'none'; document.getElementById('langContainer').style.display = 'flex'; }
        
        function enterApp(lang) {
            const dict = dicts[lang];
            for (let key in dict) { if(document.getElementById(key)) document.getElementById(key).innerText = dict[key]; }
            document.getElementById('welcomeScreen').style.display = 'none'; document.getElementById('mainApp').style.display = 'block';
        }

        function switchPage(pageId, navEl) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page' + pageId).classList.add('active');
            navEl.classList.add('active');
        }
    </script>
</body>
</html>
