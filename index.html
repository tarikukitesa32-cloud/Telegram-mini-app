<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bota Solutions</title>
    <style>
        :root {
            --primary: #ffb800;
            --bg: #090e11;
            --surface: #151d23;
            --text: #ffffff;
            --sub-text: #a0aab2;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 🤖 START PAGE */
        .glass-card {
            background: rgba(21, 29, 35, 0.7);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 28px; margin-bottom: 30px; }
        h1 span { color: var(--primary); }

        .btn-start {
            background: var(--primary);
            color: #000;
            padding: 18px 50px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .btn-start:active { transform: scale(0.95); }

        /* 🌐 LANGUAGE SELECTION */
        .lang-grid { display: none; margin-top: 20px; gap: 10px; display: flex; flex-direction: column; }
        .btn-lang {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
        }
        .btn-lang:hover { background: var(--primary); color: #000; }

        /* 📱 MAIN APP (HIDDEN BY DEFAULT) */
        #mainApp { display: none; width: 100%; max-width: 500px; padding: 20px; }
        .product-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- START SCREEN -->
    <div class="glass-card" id="startScreen">
        <h1>Bota<span>Solutions</span></h1>
        <button class="btn-start" id="startBtn" onclick="showLangs()">START / ጀምር</button>
        
        <div id="langContainer" class="lang-grid" style="display: none;">
            <button class="btn-lang" onclick="goHome('English')">English</button>
            <button class="btn-lang" onclick="goHome('Amharic')">አማርኛ</button>
            <button class="btn-lang" onclick="goHome('Oromo')">Afan Oromo</button>
        </div>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="mainApp">
        <div class="product-card">
            <h2>🎉 Welcome!</h2>
            <p>Select your lucky number below</p>
        </div>
    </div>

    <script>
        function showLangs() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('langContainer').style.display = 'flex';
        }

        function goHome(lang) {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            console.log("Selected Language: " + lang);
        }
    </script>
</body>
</html>
