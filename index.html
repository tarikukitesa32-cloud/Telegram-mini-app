<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bota Solutions App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Phase 1: Welcome Screen -->
        <div id="welcomePhase" class="phase-container">
            <h1 class="main-title">Welcome to Bota Solutions App</h1>
            <p class="subtitle">Professional Telegram Mini App</p>
            <button id="startBtn" class="tg-btn">Get Started</button>
        </div>

        <!-- Phase 2: Language Selection -->
        <div id="languagePhase" class="phase-container hidden">
            <h2>Select Language / ቋንቋ ይምረጡ</h2>
            <select id="langSelect" class="tg-input">
                <option value="en">English</option>
                <option value="am">አማርኛ</option>
                <option value="om">Afaan Oromoo</option>
            </select>
            <button id="langBtn" class="tg-btn">Next</button>
        </div>

        <!-- Phase 3: Login Section -->
        <div id="loginPhase" class="phase-container hidden">
            <h2>Login</h2>
            <input type="tel" id="phoneInput" class="tg-input" placeholder="Phone Number">
            <button id="loginBtn" class="tg-btn">Login</button>
        </div>

        <!-- Phase 4: Home / Main Content -->
        <div id="homePhase" class="phase-container hidden">
            <h2>Welcome to Home Dashboard</h2>
            <p>በደህና መጡ! ዋናው ገጽ ላይ ነዎት።</p>
        </div>

        <!-- Bottom Navigation Bar -->
        <div id="navBar" class="bottom-nav hidden">
            <div class="nav-item active"><span class="icon">🏠</span> Home</div>
            <div class="nav-item"><span class="icon">🎫</span> Buy Ticket</div>
            <div class="nav-item"><span class="icon">👤</span> Profile</div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
